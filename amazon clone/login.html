<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Login</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(to right, #e3e6e6, #ffffff);
}

/* LOGO */
.logo{
  text-align:center;
  font-size:32px;
  font-weight:bold;
  margin-top:20px;
  color:#131921;
}

/* LOGIN BOX */
.login-box{
  width:350px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.login-box h2{
  margin-bottom:20px;
}

/* INPUT */
.login-box input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

/* BUTTON */
.login-box button{
  width:100%;
  padding:10px;
  background:#febd69;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

.login-box button:hover{
  background:#f3a847;
}

/* LOCATION TEXT */
.location{
  font-size:14px;
  color:#555;
  margin-bottom:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  margin-top:20px;
  color:#555;
}

/* RESPONSIVE */
@media(max-width:500px){
  .login-box{
    width:90%;
  }
}
</style>

</head>
<body>

<div class="logo">amazon</div>

<div class="login-box">
  <h2>Sign In</h2>

  <!-- LOCATION -->
  <div class="location">
    📍 Select Your Location
  </div>

  <select id="location">
    <option>Choose Location</option>
    <option>Delhi</option>
    <option>Mumbai</option>
    <option>Kolkata</option>
    <option>Bangalore</option>
    <option>Hyderabad</option>
  </select>

  <input type="text" placeholder="Email or Mobile Number">
  <input type="password" placeholder="Password">

  <button onclick="login()">Sign In</button>

  <p style="font-size:12px; margin-top:10px;">
    By continuing, you agree to Amazon's Conditions of Use & Privacy Notice.
  </p>
</div>

<div class="footer">
  © 2026 Amazon Clone | All Rights Reserved
</div>

<script>
function login(){
  let location = document.getElementById("location").value;

  if(location === "Choose Location"){
    alert("Please select your location");
  } else {
    alert("Login Successful from " + location);
  }
}
</script>

</body>
</html>
